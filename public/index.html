<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klarna Payments Demo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://js.klarna.com/web-sdk/buttons/payment-button.css" />
</head>

<body>
  <h1>Klarna Payments Demo</h1>

  <nav class="step-indicators">
    <div class="step active" data-step="1">
      <span class="step-number">1</span>
      <span class="step-label">Create Session</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="2">
      <span class="step-number">2</span>
      <span class="step-label">Authorize Payment</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="3">
      <span class="step-number">3</span>
      <span class="step-label">Manage Order</span>
    </div>
  </nav>

  <section class="session-setup">
    <h2>Session Setup</h2>

    <div class="preset-row">
      <div class="preset-field">
        <label for="country-preset">Country / Currency</label>
        <select id="country-preset">
          <option value="US">US / USD</option>
          <option value="SE">SE / SEK</option>
          <option value="DE">DE / EUR</option>
          <option value="GB">GB / GBP</option>
          <option value="AU">AU / AUD</option>
          <option value="AT">AT / EUR</option>
          <option value="NL">NL / EUR</option>
          <option value="NO">NO / NOK</option>
          <option value="DK">DK / DKK</option>
          <option value="FI">FI / EUR</option>
        </select>
      </div>
      <div class="preset-field">
        <label for="amount-input">Amount</label>
        <div class="amount-wrapper">
          <span class="currency-symbol" id="currency-symbol">$</span>
          <input type="number" id="amount-input" value="100.00" min="0.01" step="0.01">
        </div>
      </div>
    </div>

    <label for="json-input">Session JSON payload:</label>
    <textarea id="json-input">{
  "purchase_country": "US",
  "purchase_currency": "USD",
  "locale": "en-US",
  "order_amount": 10000,
  "order_lines": [
        {
            "reference": "19-402",
            "name": "Battery Power Pack",
            "quantity": 1,
            "unit_price": 10000,
            "total_amount": 10000
        }
    ]
}</textarea>
    <div class="button-group">
      <button id="create-session">Create Session</button>
      <button id="reset-example" class="btn-secondary">Reset Example</button>
    </div>
  </section>

  <section class="checkout-wrapper section-hidden" id="checkout-section">
    <h2>Payment Method</h2>
    <div id="klarna-container"></div>
    <button class="klarna-sdk-button theme-dark shape-default" aria-label="Continue with Klarna" id="pay-button">
      <div class="klarna-sdk-button__outline" aria-hidden="true"></div>
      <div class="klarna-sdk-button__inner-container">
        <span class="klarna-sdk-button__text">
          <span class="klarna-sdk-button-copy">Continue with</span>
          <span class="klarna-sdk-button-badge" aria-hidden="true"></span>
          <span class="klarna-sdk-button-text-logo" aria-hidden="true"></span>
        </span>
        <span class="klarna-sdk-button__spinner" aria-hidden="true"></span>
      </div>
    </button>
  </section>

  <pre id="response"></pre>

  <section class="order-management section-hidden" id="order-section">
    <h2>Order Management</h2>
    <label for="order-id-input">Order ID:</label>
    <input type="text" id="order-id-input" placeholder="Enter Klarna order ID">

    <div class="order-buttons">
      <button id="query-order">Query Order</button>
      <button id="capture-order">Capture</button>
      <button id="cancel-order">Cancel</button>
      <button id="refund-order">Refund</button>
    </div>
  </section>

  <script src="https://x.klarnacdn.net/kp/lib/v1/api.js"></script>
  <script src="script.js"></script>
</body>

</html>
